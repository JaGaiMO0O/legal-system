<div class="min-h-screen bg-[rgb(var(--surface-muted))]">
  <!-- Header -->
  <header
    class="text-[rgb(var(--text-inverse))] shadow-xl relative overflow-hidden"
    style="background: var(--gradient-primary)"
  >
    <div
      class="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent"
    ></div>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
      <div class="flex items-center justify-between h-20">
        <div class="flex items-center space-x-4 rtl:space-x-reverse">
          <div class="flex items-center space-x-3">
            <div
              class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center backdrop-blur-sm"
            >
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
                />
              </svg>
            </div>
            <div>
              <h1 class="text-xl md:text-2xl font-bold tracking-tight">Legal System</h1>
              <p class="text-xs text-white/80 mt-0.5 hidden sm:block">Case Management Portal</p>
            </div>
          </div>
        </div>
        <div class="flex items-center space-x-2 md:space-x-3 rtl:space-x-reverse">
          <app-undo-redo class="hidden md:block"></app-undo-redo>
          <app-theme-toggle></app-theme-toggle>
        </div>
      </div>
    </div>
  </header>

  <div class="flex flex-col md:flex-row">
    <!-- Mobile Menu Button -->
    <button
      (click)="toggleSidebar()"
      class="md:hidden fixed top-20 left-4 z-50 p-2 bg-[rgb(var(--surface))] rounded-lg shadow-lg border border-[rgb(var(--border))]"
      aria-label="Toggle menu"
    >
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4 6h16M4 12h16M4 18h16"
        />
      </svg>
    </button>

    <!-- Sidebar Navigation -->
    <aside
      [class.hidden]="!sidebarOpen"
      [class.fixed]="sidebarOpen"
      class="w-64 bg-[rgb(var(--surface))] border-r border-[rgb(var(--border-light))] min-h-[calc(100vh-5rem)] shadow-lg md:block z-40 md:relative"
    >
      <nav class="p-4 space-y-2">
        <a
          routerLink="/legal/dashboard"
          routerLinkActive="bg-gradient-to-r from-[rgb(var(--primary))] to-[rgb(var(--primary-dark))] text-[rgb(var(--text-inverse))] shadow-md"
          [routerLinkActiveOptions]="{ exact: false }"
          class="flex items-center space-x-3 rtl:space-x-reverse px-4 py-3 rounded-xl hover:bg-[rgb(var(--surface-muted))] transition-all duration-200 font-medium group"
        >
          <svg
            class="w-5 h-5 group-hover:scale-110 transition-transform duration-200"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
            />
          </svg>
          <span>Cases</span>
        </a>
        <a
          routerLink="/claims"
          routerLinkActive="bg-gradient-to-r from-[rgb(var(--primary))] to-[rgb(var(--primary-dark))] text-[rgb(var(--text-inverse))] shadow-md"
          class="flex items-center space-x-3 rtl:space-x-reverse px-4 py-3 rounded-xl hover:bg-[rgb(var(--surface-muted))] transition-all duration-200 font-medium group"
        >
          <svg
            class="w-5 h-5 group-hover:scale-110 transition-transform duration-200"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
            />
          </svg>
          <span>Claims</span>
        </a>
        <a
          routerLink="/arbitrations"
          routerLinkActive="bg-gradient-to-r from-[rgb(var(--primary))] to-[rgb(var(--primary-dark))] text-[rgb(var(--text-inverse))] shadow-md"
          class="flex items-center space-x-3 rtl:space-x-reverse px-4 py-3 rounded-xl hover:bg-[rgb(var(--surface-muted))] transition-all duration-200 font-medium group"
        >
          <svg
            class="w-5 h-5 group-hover:scale-110 transition-transform duration-200"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"
            />
          </svg>
          <span>Arbitrations</span>
        </a>
        <a
          routerLink="/execution"
          routerLinkActive="bg-gradient-to-r from-[rgb(var(--primary))] to-[rgb(var(--primary-dark))] text-[rgb(var(--text-inverse))] shadow-md"
          class="flex items-center space-x-3 rtl:space-x-reverse px-4 py-3 rounded-xl hover:bg-[rgb(var(--surface-muted))] transition-all duration-200 font-medium group"
        >
          <svg
            class="w-5 h-5 group-hover:scale-110 transition-transform duration-200"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
            />
          </svg>
          <span>Execution Cases</span>
        </a>
        <a
          routerLink="/settlements"
          routerLinkActive="bg-gradient-to-r from-[rgb(var(--primary))] to-[rgb(var(--primary-dark))] text-[rgb(var(--text-inverse))] shadow-md"
          class="flex items-center space-x-3 rtl:space-x-reverse px-4 py-3 rounded-xl hover:bg-[rgb(var(--surface-muted))] transition-all duration-200 font-medium group"
        >
          <svg
            class="w-5 h-5 group-hover:scale-110 transition-transform duration-200"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
          <span>Business Settlements</span>
        </a>
        <a
          routerLink="/lawyers"
          routerLinkActive="bg-gradient-to-r from-[rgb(var(--primary))] to-[rgb(var(--primary-dark))] text-[rgb(var(--text-inverse))] shadow-md"
          class="flex items-center space-x-3 rtl:space-x-reverse px-4 py-3 rounded-xl hover:bg-[rgb(var(--surface-muted))] transition-all duration-200 font-medium group"
        >
          <svg
            class="w-5 h-5 group-hover:scale-110 transition-transform duration-200"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M5.121 17.804A4 4 0 019 16h6a4 4 0 013.879 1.804M15 11a3 3 0 11-6 0 3 3 0 016 0zM6 8V6a6 6 0 1112 0v2"
            />
          </svg>
          <span>Lawyers</span>
        </a>
        <a
          routerLink="/courts"
          routerLinkActive="bg-gradient-to-r from-[rgb(var(--primary))] to-[rgb(var(--primary-dark))] text-[rgb(var(--text-inverse))] shadow-md"
          class="flex items-center space-x-3 rtl:space-x-reverse px-4 py-3 rounded-xl hover:bg-[rgb(var(--surface-muted))] transition-all duration-200 font-medium group"
        >
          <svg
            class="w-5 h-5 group-hover:scale-110 transition-transform duration-200"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
            />
          </svg>
          <span>Courts</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main
      class="flex-1 p-4 md:p-8 bg-gradient-to-br from-[rgb(var(--surface-muted))] via-[rgb(var(--surface))] to-[rgb(var(--surface-muted))]"
    >
      <router-outlet></router-outlet>
    </main>
  </div>
  <app-toast></app-toast>
  <app-confirm-dialog></app-confirm-dialog>
</div>
