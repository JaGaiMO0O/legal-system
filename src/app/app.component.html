<header
  class="bg-[rgb(var(--primary))] text-[rgb(var(--text-inverse))] p-4 flex items-center justify-between"
>
  <h1 class="text-xl font-semibold">{{ 'app.title' | translate }}</h1>
  <div class="flex items-center space-x-2 rtl:space-x-reverse">
    <app-theme-toggle></app-theme-toggle>
    <app-language-switcher></app-language-switcher>
  </div>
</header>
<main class="p-6 max-w-6xl mx-auto">
  <p class="text-[rgb(var(--text-muted))]">{{ 'app.welcome' | translate }}</p>
  <nav class="mt-4 space-x-4 rtl:space-x-reverse">
    <a
      routerLink="/cases"
      class="underline decoration-[rgb(var(--primary))] text-[rgb(var(--text))] hover:text-[rgb(var(--primary))]"
      >{{ 'nav.cases' | translate }}</a
    >
    <a
      routerLink="/lawyers"
      class="underline decoration-[rgb(var(--primary))] text-[rgb(var(--text))] hover:text-[rgb(var(--primary))]"
      >{{ 'nav.lawyers' | translate }}</a
    >
    <a
      routerLink="/arbitrations"
      class="underline decoration-[rgb(var(--primary))] text-[rgb(var(--text))] hover:text-[rgb(var(--primary))]"
      >{{ 'nav.arbitrations' | translate }}</a
    >
    <a
      routerLink="/settings"
      class="underline decoration-[rgb(var(--primary))] text-[rgb(var(--text))] hover:text-[rgb(var(--primary))]"
      >{{ 'nav.settings' | translate }}</a
    >
  </nav>
  <section class="mt-6">
    <router-outlet></router-outlet>
  </section>
</main>
