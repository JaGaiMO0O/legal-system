<header class="bg-blue-600 text-white p-4 flex items-center justify-between">
  <h1 class="text-xl font-semibold">{{ 'app.title' | translate }}</h1>
  <app-language-switcher></app-language-switcher>
</header>
<main class="p-6 max-w-6xl mx-auto">
  <p class="text-gray-700">{{ 'app.welcome' | translate }}</p>
  <nav class="mt-4 space-x-4 rtl:space-x-reverse">
    <a routerLink="/cases" class="text-blue-700 underline">{{ 'nav.cases' | translate }}</a>
    <a routerLink="/lawyers" class="text-blue-700 underline">{{ 'nav.lawyers' | translate }}</a>
    <a routerLink="/arbitrations" class="text-blue-700 underline">{{
      'nav.arbitrations' | translate
    }}</a>
    <a routerLink="/settings" class="text-blue-700 underline">{{ 'nav.settings' | translate }}</a>
  </nav>
  <section class="mt-6">
    <router-outlet></router-outlet>
  </section>
</main>
