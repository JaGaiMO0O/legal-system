<div class="min-h-screen bg-[rgb(var(--surface-muted))]">
  <!-- Header -->
  <header class="bg-[rgb(var(--primary))] text-[rgb(var(--text-inverse))] shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center space-x-4 rtl:space-x-reverse">
          <h1 class="text-xl font-bold">Legal System</h1>
        </div>
        <div class="flex items-center space-x-3 rtl:space-x-reverse">
          <div class="relative">
            <input
              #q
              type="search"
              class="bg-white/10 border-white/20 text-white placeholder-white/70 rounded-lg px-4 py-2 text-sm w-64 focus:outline-none focus:ring-2 focus:ring-white/50"
              placeholder="Search documents and cases..."
            />
          </div>
          <a
            [routerLink]="['/search']"
            [queryParams]="{ q: q.value || '' }"
            class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg text-sm font-medium transition"
          >
            View
          </a>
          <app-theme-toggle></app-theme-toggle>
          <app-language-switcher></app-language-switcher>
        </div>
      </div>
    </div>
  </header>

  <div class="flex">
    <!-- Sidebar Navigation -->
    <aside
      class="w-64 bg-[rgb(var(--surface))] border-r border-[rgb(var(--border))] min-h-[calc(100vh-4rem)] shadow-sm"
    >
      <nav class="p-4 space-y-1">
        <a
          routerLink="/cases"
          routerLinkActive="bg-[rgb(var(--primary))] text-[rgb(var(--text-inverse))]"
          [routerLinkActiveOptions]="{ exact: false }"
          class="flex items-center space-x-3 rtl:space-x-reverse px-4 py-3 rounded-lg hover:bg-[rgb(var(--surface-muted))] transition font-medium"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
            />
          </svg>
          <span>Cases</span>
        </a>
        <a
          routerLink="/claims"
          routerLinkActive="bg-[rgb(var(--primary))] text-[rgb(var(--text-inverse))]"
          class="flex items-center space-x-3 rtl:space-x-reverse px-4 py-3 rounded-lg hover:bg-[rgb(var(--surface-muted))] transition font-medium"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
            />
          </svg>
          <span>Claims</span>
        </a>
        <a
          routerLink="/arbitrations"
          routerLinkActive="bg-[rgb(var(--primary))] text-[rgb(var(--text-inverse))]"
          class="flex items-center space-x-3 rtl:space-x-reverse px-4 py-3 rounded-lg hover:bg-[rgb(var(--surface-muted))] transition font-medium"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"
            />
          </svg>
          <span>Arbitrations</span>
        </a>
        <a
          routerLink="/execution"
          routerLinkActive="bg-[rgb(var(--primary))] text-[rgb(var(--text-inverse))]"
          class="flex items-center space-x-3 rtl:space-x-reverse px-4 py-3 rounded-lg hover:bg-[rgb(var(--surface-muted))] transition font-medium"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
            />
          </svg>
          <span>Execution Cases</span>
        </a>
        <a
          routerLink="/settlements"
          routerLinkActive="bg-[rgb(var(--primary))] text-[rgb(var(--text-inverse))]"
          class="flex items-center space-x-3 rtl:space-x-reverse px-4 py-3 rounded-lg hover:bg-[rgb(var(--surface-muted))] transition font-medium"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
          <span>Business Settlements</span>
        </a>
        <a
          routerLink="/lawyers"
          routerLinkActive="bg-[rgb(var(--primary))] text-[rgb(var(--text-inverse))]"
          class="flex items-center space-x-3 rtl:space-x-reverse px-4 py-3 rounded-lg hover:bg-[rgb(var(--surface-muted))] transition font-medium"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"
            />
          </svg>
          <span>Lawyers</span>
        </a>
        <a
          routerLink="/documents"
          routerLinkActive="bg-[rgb(var(--primary))] text-[rgb(var(--text-inverse))]"
          class="flex items-center space-x-3 rtl:space-x-reverse px-4 py-3 rounded-lg hover:bg-[rgb(var(--surface-muted))] transition font-medium"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
            />
          </svg>
          <span>Documents</span>
        </a>
        <div class="pt-4 border-t border-[rgb(var(--border))] mt-4">
          <a
            routerLink="/settings"
            routerLinkActive="bg-[rgb(var(--primary))] text-[rgb(var(--text-inverse))]"
            class="flex items-center space-x-3 rtl:space-x-reverse px-4 py-3 rounded-lg hover:bg-[rgb(var(--surface-muted))] transition font-medium"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
              />
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
              />
            </svg>
            <span>Settings</span>
          </a>
        </div>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
